<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XINIX Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#020617;
  color:white;
  padding:20px;
}

.box{
  max-width:800px;
  margin:auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  box-sizing:border-box;
}

button{
  padding:10px 20px;
  cursor:pointer;
}

.hidden{
  display:none;
}

.article{
  border-top:1px solid #444;
  padding:10px 0;
}
</style>
</head>
<body>

<div id="loginBox" class="box">

<h1>XINIX CORE LOGIN</h1>

<input
id="password"
type="password"
placeholder="Enter Password"
>

<button id="loginBtn">
LOGIN
</button>

<p id="message"></p>

</div>

<div id="dashboard" class="box hidden">

<h1>XINIX ADMIN</h1>

<h2>Create Research Article</h2>

<input
id="title"
placeholder="Title"
>

<input
id="category"
placeholder="Category"
>

<textarea
id="content"
placeholder="Content"
></textarea>

<button id="saveBtn">
Save Article
</button>

<h2>Articles</h2>

<div id="articles"></div>

</div>

<script>

const PASSWORD = "XINIX2026";

const SUPABASE_URL =
"https://ioiygqwwjbirxaoktwmm.supabase.co";

const SUPABASE_KEY =
"YOUR_ANON_KEY_HERE";

const client =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("loginBtn")
.addEventListener("click", async ()=>{

const entered =
document.getElementById("password").value;

if(entered !== PASSWORD){

document.getElementById("message")
.innerText = "Wrong Password";

return;

}

document
.getElementById("loginBox")
.classList.add("hidden");

document
.getElementById("dashboard")
.classList.remove("hidden");

loadArticles();

});

document
.getElementById("saveBtn")
.addEventListener("click", async ()=>{

const title =
document.getElementById("title").value;

const category =
document.getElementById("category").value;

const content =
document.getElementById("content").value;

const result =
await client
.from("research_articles")
.insert([
{
title,
category,
content
}
]);

console.log(result);

loadArticles();

});

async function loadArticles(){

const response =
await client
.from("research_articles")
.select("*")
.order("id",{ascending:false});

const articles =
response.data || [];

const container =
document.getElementById("articles");

container.innerHTML = "";

articles.forEach(article=>{

container.innerHTML += `
<div class="article">
<h3>${article.title}</h3>
<p>${article.category || ""}</p>
<p>${article.content || ""}</p>
</div>
`;

});

}

</script>

</body>
</html>
