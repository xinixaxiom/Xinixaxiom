<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XINIX AXIOM</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* =========================
YOUR ORIGINAL CSS (UNCHANGED)
========================= */

body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

.background{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
}

.grid-bg{
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

.orb{
  position:absolute;
  border-radius:50%;
  background:rgba(0,255,255,0.08);
  filter:blur(25px);
  animation:float 10s infinite ease-in-out;
}

.orb:nth-child(1){
  width:350px;
  height:350px;
  left:-100px;
  top:50px;
}

.orb:nth-child(2){
  width:250px;
  height:250px;
  right:-80px;
  top:300px;
}

.orb:nth-child(3){
  width:500px;
  height:500px;
  left:30%;
  bottom:-250px;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* =========================
AI ONLY (NEW ADDITION)
========================= */

#aiBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#22d3ee;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:99999;
  font-size:22px;
  box-shadow:0 0 20px rgba(0,255,255,0.4);
}

#aiBox{
  position:fixed;
  bottom:90px;
  right:20px;
  width:300px;
  height:380px;
  background:rgba(0,0,0,0.9);
  border:1px solid rgba(34,211,238,0.3);
  border-radius:15px;
  display:none;
  flex-direction:column;
  z-index:99999;
  overflow:hidden;
}

#aiHeader{
  padding:10px;
  background:rgba(34,211,238,0.1);
  font-weight:bold;
  text-align:center;
}

#aiMessages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  font-size:13px;
}

#aiInputBox{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

#aiInput{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:black;
  color:white;
}

#aiSend{
  background:#22d3ee;
  border:none;
  padding:10px;
  cursor:pointer;
}

</style>
</head>

<body class="grid-bg">

<!-- =========================
YOUR ORIGINAL WEBSITE (UNCHANGED)
========================= -->

<div class="background">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- 🔴 KEEP ALL YOUR ORIGINAL HTML HERE EXACTLY AS YOU WROTE IT -->
<!-- I DID NOT REMOVE OR EDIT ANY SECTION -->

<!-- =========================
AI FLOATING BUTTON
========================= -->

<div id="aiBtn">🤖</div>

<div id="aiBox">

  <div id="aiHeader">XINIX AI CORE</div>

  <div id="aiMessages"></div>

  <div id="aiInputBox">
    <input id="aiInput" placeholder="Ask AI...">
    <button id="aiSend">➤</button>
  </div>

</div>

<script>

/* =========================
AI FUNCTION ONLY (NO CHANGES TO YOUR SITE)
========================= */

const aiBtn = document.getElementById("aiBtn");
const aiBox = document.getElementById("aiBox");
const aiMessages = document.getElementById("aiMessages");
const aiInput = document.getElementById("aiInput");
const aiSend = document.getElementById("aiSend");

aiBtn.onclick = () => {
  aiBox.style.display = aiBox.style.display === "flex" ? "none" : "flex";
  aiBox.style.flexDirection = "column";
};

function addMsg(role, text){
  const div = document.createElement("div");
  div.style.margin = "6px 0";
  div.innerHTML = `<b>${role}:</b> ${text}`;
  aiMessages.appendChild(div);
  aiMessages.scrollTop = aiMessages.scrollHeight;
}

async function sendAI(){

  const msg = aiInput.value.trim();
  if(!msg) return;

  addMsg("You", msg);
  aiInput.value = "";

  addMsg("AI", "Thinking...");

  try{

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data = await res.json();

    aiMessages.lastChild.remove();
    addMsg("AI", data.reply);

  }catch(e){
    aiMessages.lastChild.remove();
    addMsg("AI","Error connecting to AI");
  }
}

aiSend.onclick = sendAI;

aiInput.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") sendAI();
});

</script>

</body>
</html>
