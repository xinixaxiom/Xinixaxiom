<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XINIX AXIOM</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* =========================
BACKGROUND
========================= */

.background{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
}

.grid-bg{
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

.orb{
  position:absolute;
  border-radius:50%;
  background:rgba(0,255,255,0.08);
  filter:blur(25px);
  animation:float 10s infinite ease-in-out;
}

.orb:nth-child(1){width:350px;height:350px;left:-100px;top:50px;}
.orb:nth-child(2){width:250px;height:250px;right:-80px;top:300px;}
.orb:nth-child(3){width:500px;height:500px;left:30%;bottom:-250px;}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* =========================
LOADER
========================= */

#loader{
  position:fixed;
  inset:0;
  background:#020617;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  transition:1.5s;
}

.loader-hidden{
  opacity:0;
  pointer-events:none;
}

/* =========================
UI
========================= */

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  transition:0.5s;
}

.card:hover{
  transform:translateY(-10px);
  border-color:rgba(0,255,255,0.4);
}

/* =========================
AI BUTTON
========================= */

#aiBtn{
  position:fixed;
  bottom:25px;
  right:25px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:#22d3ee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
  z-index:99999;
  box-shadow:0 0 25px rgba(0,255,255,0.5);
}

/* =========================
AI PANEL
========================= */

#aiPanel{
  position:fixed;
  bottom:100px;
  right:25px;
  width:340px;
  height:450px;
  background:rgba(0,0,0,0.95);
  border:1px solid rgba(34,211,238,0.4);
  border-radius:20px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:99999;
  backdrop-filter:blur(20px);
}

#aiHeader{
  padding:12px;
  background:rgba(34,211,238,0.1);
  font-weight:bold;
  text-align:center;
}

#aiMessages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  font-size:14px;
}

#aiInputBox{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

#aiInput{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:black;
  color:white;
}

#aiSend{
  background:#22d3ee;
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

</style>
</head>

<body class="grid-bg">

<!-- BACKGROUND -->
<div class="background">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- LOADER -->
<div id="loader">
  <h1 style="color:#22d3ee;letter-spacing:6px;">XINIX AXIOM</h1>
</div>

<!-- HERO -->
<section style="padding:120px;text-align:center;">
  <h1 style="font-size:70px;font-weight:900;">
    ENGINEERING <br>
    <span style="color:#22d3ee;">CONSCIOUSNESS</span>
  </h1>
  <p style="color:#94a3b8;max-width:600px;margin:auto;">
    A futuristic intelligence ecosystem exploring cognition, AI, and simulation systems.
  </p>
</section>

<!-- AI BUTTON -->
<div id="aiBtn">🤖</div>

<!-- AI PANEL -->
<div id="aiPanel">

  <div id="aiHeader">XINIX AI CORE</div>

  <div id="aiMessages"></div>

  <div id="aiInputBox">
    <input id="aiInput" placeholder="Ask XINIX AI...">
    <button id="aiSend">➤</button>
  </div>

</div>

<script>

/* =========================
AI SYSTEM
========================= */

const aiBtn = document.getElementById("aiBtn");
const aiPanel = document.getElementById("aiPanel");
const aiMessages = document.getElementById("aiMessages");
const aiInput = document.getElementById("aiInput");
const aiSend = document.getElementById("aiSend");

aiBtn.onclick = () => {
  aiPanel.style.display = aiPanel.style.display === "flex" ? "none" : "flex";
  aiPanel.style.flexDirection = "column";
};

function addMessage(role, text){
  const div = document.createElement("div");
  div.style.margin = "8px 0";
  div.innerHTML = `<b style="color:${role==='user'?'#22d3ee':'#fff'}">${role}:</b> ${text}`;
  aiMessages.appendChild(div);
  aiMessages.scrollTop = aiMessages.scrollHeight;
}

async function sendMessage(){

  const msg = aiInput.value.trim();
  if(!msg) return;

  addMessage("user", msg);
  aiInput.value = "";

  addMessage("ai", "Thinking...");

  try{

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data = await res.json();

    aiMessages.lastChild.remove();
    addMessage("ai", data.reply);

  }catch(err){
    aiMessages.lastChild.remove();
    addMessage("ai", "AI connection error.");
  }
}

aiSend.onclick = sendMessage;

aiInput.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") sendMessage();
});

/* =========================
LOADER
========================= */

window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").classList.add("loader-hidden");
  },1500);
});

</script>

</body>
</html>
